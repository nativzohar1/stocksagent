name: Decoupling Hunter Scan

on:
  schedule:
    # cron is in UTC. US market closes 16:00 ET (~20:00-21:00 UTC).
    # Run 22:00 UTC on weekdays = after close, end-of-day data is settled.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write          # needed to commit results/out.json back to the repo

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45     # S&P 500 (~503 names) can take 15-25 min — margin for safety

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        run: python scan.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/out.json
          if git diff --staged --quiet; then
            echo "No changes in out.json — nothing to commit."
          else
            git commit -m "chore(scan): update results/out.json [skip ci] ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
