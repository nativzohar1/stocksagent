name: Decoupling Hunter Scan

on:
  schedule:
    - cron: '30 21 * * 1-5'      # 21:30 UTC, Mon-Fri (~30 min after US close, DST-safe)
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: decoupling-hunter-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run scanner
        run: python scan.py
      - name: Commit & push out.json (auto-skips on holidays / no-change)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/out.json
          if git diff --cached --quiet; then
            echo "No changes (holiday guard fired or identical) - nothing to commit."
          else
            git commit -m "scan: update out.json ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
