name: Decoupling Hunter Scan

# ---------------------------------------------------------------------------
# Schedule: 21:30 UTC, Mon-Fri  (~30 min after the US market close).
# 21:30 UTC falls AFTER 16:00 ET year-round (17:30 EDT in summer / 16:30 EST
# in winter), so it is DST-safe. On US holidays scan.py's zero-dependency guard
# detects the closed session and exits without rewriting out.json (no commit).
# ---------------------------------------------------------------------------
on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}          # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write                # needed to commit results/out.json back to the repo

concurrency:
  group: decoupling-hunter-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        run: python scan.py

      - name: Commit & push out.json (skips automatically on holidays / no-change)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "No changes (holiday/weekend guard fired or identical output) - nothing to commit."
          else
            git commit -m "scan: update out.json ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
