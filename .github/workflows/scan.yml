name: stock-breakout-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scanner
        run: |
          mkdir -p results
          python scan.py --top 3 --json results/out.json

      - name: Commit results
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f results/out.json
          git commit -m "scan $(date +%F)" || echo "no changes"
          git push
