name: Decoupling Hunter Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run backtest
        run: python backtest.py

      - name: Commit results
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add results/backtest_equity.csv results/backtest_trades.csv
          git commit -m "backtest results" || echo "no changes"
          git push
